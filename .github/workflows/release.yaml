name: Release

on:
  workflow_dispatch:

concurrency: release

jobs:
  test-python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: python
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        working-directory: python
        run: pytest tests/ -v --cov=jentic.problem_details --cov-report=term-missing

  test-typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        working-directory: typescript
        run: npm ci

      - name: Build
        working-directory: typescript
        run: npm run build

      - name: Run tests
        working-directory: typescript
        run: npm test

      - name: Type check
        working-directory: typescript
        run: npm run typecheck

  release:
    name: Release packages
    needs: [test-python, test-typescript]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: release
      url: https://github.com/jentic/api-problem-details/releases
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install semantic-release
        run: >
          npm install -g
          semantic-release
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/github
          @semantic-release/npm
          @semantic-release/exec
          @semantic-release/git

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Build TypeScript package
        working-directory: typescript
        run: |
          npm ci
          npm run build
          cp ../LICENSE ../NOTICE .
          npm pack
          rm -f LICENSE NOTICE

      - name: Attest npm tarball
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: typescript/*.tgz

      - name: Publish TypeScript package to npm (OIDC)
        working-directory: typescript
        run: |
          set -euo pipefail
          TARBALL="$(ls -1 *.tgz | head -n 1)"
          echo "Publishing $TARBALL"
          npm publish "file:./$TARBALL" --provenance

      - name: Publish Python package to PyPI (OIDC)
        if: hashFiles('python/dist/*.whl') != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
